name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [18.x, 20.x, 22.x]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}

    - name: Install dependencies
      run: npm ci

    - name: Run linter
      run: npm run lint --if-present

    - name: Test CLI generation (Monolith)
      run: |
        node bin/cli.js test-mono mono << EOF
        cors
        helmet
        morgan
        y
        bcrypt
        EOF

    - name: Verify monolith project
      run: |
        cd test-mono
        npm install
        npm run build

    - name: Test CLI generation (Microservice)
      run: |
        node bin/cli.js test-micro micro << EOF
        docker
        cors
        helmet
        y
        bcrypt
        EOF

    - name: Verify microservice project structure
      run: |
        test -d test-micro/services/gateway
        test -d test-micro/services/health-service
        test -f test-micro/docker-compose.yml

    - name: Cleanup test projects
      run: |
        rm -rf test-mono test-micro
      if: always()
