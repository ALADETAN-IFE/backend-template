name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  test:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macOS]
        node-version: [18.x, 22.x, 24.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint --if-present

      - name: Test CLI generation (Monolith — no auth)
        shell: bash
        env:
          CI: false
        run: |
          node bin/cli.js test-mono-noauth mono << 'EOF'
          cors
          helmet
          morgan
          bcrypt
          n
          team
          n
          EOF

      - name: Verify monolith project (no auth)
        run: |
          cd test-mono-noauth
          npm install
          npm run build

      - name: Test CLI generation (Monolith — auth)
        shell: bash
        env:
          CI: false
        run: |
          node bin/cli.js test-mono-auth mono << 'EOF'
          cors
          helmet
          morgan
          bcrypt
          y
          team
          n
          EOF

      - name: Verify monolith project (auth)
        run: |
          cd test-mono-auth
          npm install
          npm run build

      - name: Test CLI generation (Microservice)
        shell: bash
        run: |
          node bin/cli.js test-micro micro << EOF
          docker
          cors
          helmet
          bcrypt
          EOF

      - name: Verify microservice project structure
        run: |
          test -d test-micro/services/gateway
          test -d test-micro/services/health-service
          test -f test-micro/docker-compose.yml

      - name: Cleanup test projects
        shell: bash
        run: |
          rm -rf test-mono-noauth test-mono-auth test-micro
        if: always()
